name: Feature Request
description: Propose a new utility, syntax, or behaviour
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check [existing issues](https://github.com/koyev/fluidwind/issues?q=label%3Aenhancement) first - your idea may already be tracked.

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to achieve? What problem does this solve?
      placeholder: "I want to fluidly scale border-radius across the page, but fw-rounded-* isn't supported yet."
    validations:
      required: true

  - type: textarea
    id: proposed-syntax
    attributes:
      label: Proposed syntax or API
      description: How would you write it in HTML / config?
      render: html
      placeholder: '<div class="fw-inset-[0px-20px]"></div>'
    validations:
      required: true

  - type: textarea
    id: expected-output
    attributes:
      label: Expected CSS output
      description: What CSS should Fluidwind generate?
      render: css
      placeholder: "inset: clamp(0rem, 1.88vw + ...);"

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds have you tried?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, prior art, screenshots - anything helpful
